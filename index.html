<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Care Dashboard</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    
    <!-- Official Google Firebase SDK Libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background: #121212; color: #fff; }
        .btn { padding: 20px 40px; font-size: 22px; cursor: pointer; border-radius: 12px; border: none; margin: 10px; font-weight: bold; transition: 0.2s; }
        .on-btn { background-color: #2ecc71; color: white; }
        .on-btn:active { background-color: #27ae60; }
        .off-btn { background-color: #e74c3c; color: white; }
        .off-btn:active { background-color: #c0392b; }
        #status { font-size: 20px; color: #aaa; margin-top: 30px; }
        .highlight { color: #3498db; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Plant Care Ecosystem</h2>
    <p>Secure Google Firebase Infrastructure Bypass</p>

    <button class="btn on-btn" onclick="setLedStatus(1)">TURN ON</button>
    <button class="btn off-btn" onclick="setLedStatus(0)">TURN OFF</button>

    <div id="status">Database Sync: <span id="db-state" class="highlight">Connecting...</span></div>

    <script>
        // Your explicit Firebase Configuration
     // Your explicit Firebase Configuration
     const firebaseConfig = {
           apiKey: "AIzaSyCGYiqhSXRExn2u-6U33arB1PFo_ahj5zQ",
           authDomain: "plant-4db40.firebaseapp.com",
           databaseURL: "https://plant-4db40-default-rtdb.firebaseio.com",
           projectId: "plant-4db40",
           storageBucket: "plant-4db40.firebasestorage.app",
           messagingSenderId: "363961989306",
        appId: "1:363961989306:web:7f9320f6e195399943aa83"
};

// Initialize Firebase (Using the v8 script syntax loaded at the top of your file)
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

// Reference to our control path in the database tree
    const ledRef = database.ref('plantcare/led_trigger');

        // Realtime listener: Whenever the database changes, update the web UI instantly
        ledRef.on('value', (snapshot) => {
            const val = snapshot.val();
            if (val === 1) {
                document.getElementById('db-state').innerHTML = "LED is ON";
                document.getElementById('db-state').style.color = "#2ecc71";
            } else if (val === 0) {
                document.getElementById('db-state').innerHTML = "LED is OFF";
                document.getElementById('db-state').style.color = "#e74c3c";
            } else {
                document.getElementById('db-state').innerHTML = "Awaiting System Init...";
            }
        });

        // Function execution to change database values on button clicks
        function setLedStatus(state) {
            ledRef.set(state).catch(error => {
                alert("Database write failed: " + error.message);
            });
        }
    </script>
</body>
</html>
