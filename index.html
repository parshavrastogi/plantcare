<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global ESP32 Controller</title>
    <!-- MQTT over WebSockets Client Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background: #121212; color: #fff; }
        .btn { padding: 20px 40px; font-size: 22px; cursor: pointer; border-radius: 12px; border: none; margin: 10px; font-weight: bold; }
        .on-btn { background-color: #2ecc71; color: white; }
        .off-btn { background-color: #e74c3c; color: white; }
        #status { font-size: 18px; color: #aaa; margin-top: 30px; }
    </style>
</head>
<body>

    <h2>Global Bidirectional Control</h2>
    <p>Bypass port forwarding via Cloud MQTT WebSockets</p>

    <button class="btn on-btn" onclick="sendControl('ON')">TURN ON</button>
    <button class="btn off-btn" onclick="sendControl('OFF')">TURN OFF</button>

    <div id="status">Hardware Status: Unknown</div>

    <script>
        // Connect to the EMQX broker using WebSockets port 8083 or 8084(SSL)
        const broker = 'wss://broker.hivemq.com:8884/mqtt';
        const topic_sub = "parshproject123/led/status";
        const topic_pub = "parshproject123/led/control";

        const client = mqtt.connect(broker);

        client.on('connect', () => {
            document.getElementById('status').innerHTML = "Connected to Cloud Broker. Awaiting ESP32...";
            client.subscribe(topic_sub);
        });

        client.on('message', (topic, message) => {
            if(topic === topic_sub) {
                document.getElementById('status').innerHTML = `Hardware Status: LED is <b>${message.toString()}</b>`;
            }
        });

        function sendControl(command) {
            if(client.connected) {
                client.publish(topic_pub, command);
            } else {
                alert("Not connected to broker!");
            }
        }
    </script>
</body>
</html>
